name: Build
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
jobs:
  test:
    name: ${{ matrix.cfg.name }}
    runs-on: ${{ matrix.cfg.os }}
    strategy:
      matrix:
        cfg:
          - {name: 'linux clang', os: ubuntu-latest, preset: debug-clang}
          - {name: 'apple clang', os: macos-latest, preset: debug}
          - {name: 'windows msvc', os: windows-latest, preset: debug}
          - {name: 'windows clang', os: windows-latest, preset: debug-clang}
    steps:
      - name: Clone
        uses: actions/checkout@v4
      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5
      - name: VC Vars
        # Setup vcvars on Windows
        # MSVC's address sanitizer attaches dependencies to several DLLs which are not in PATH
        # vcvars will add them to PATH and allow msvc asan executables to run
        if: matrix.cfg.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1
      - name: Configure
        run: cmake --preset ${{ matrix.cfg.preset }} -B build
      - name: Build
        run: cmake --build build
